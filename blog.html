<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .gallery img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }
        .gallery img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <nav id="desktop-nav">
        <div class="logo">Home</div>
        <div>
            <ul class="nav-links">
                <li><a href="./index.html">Back</a></li>
            </ul>
        </div>
    </nav>

    <h2>My Photo Gallery</h2>
    <div class="gallery">
        <img src="photos/image1.jpg" alt="Photo 1">
        <img src="photos/image2.jpg" alt="Photo 2">
        <img src="photos/image3.jpg" alt="Photo 3">
        <img src="photos/image4.jpg" alt="Photo 4">
        <img src="photos/image5.jpg" alt="Photo 5">
    </div>

</body>
</html>
